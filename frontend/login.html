<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - FaceAuth</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🎓 FaceAuth</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="register.html">Register</a></li>
      <li><a href="login.html" class="active">Login</a></li>
    </ul>
  </nav>

  <main class="auth-main">
    <div class="auth-card">
      <h2>Sign In</h2>

      <!-- Tab selector -->
      <div class="tab-bar">
        <button class="tab active" data-tab="face">👁️ Face Login</button>
        <button class="tab" data-tab="password">🔑 Password Login</button>
      </div>

      <!-- Face Login tab -->
      <div id="tab-face" class="tab-content active">
        <p class="hint">Look at the camera and click "Login with Face" when your face is detected.</p>
        <div class="camera-container">
          <video id="video" autoplay muted playsinline></video>
          <canvas id="overlay"></canvas>
          <div id="faceStatus" class="face-status">Starting camera…</div>
        </div>
        <button id="faceLoginBtn" class="btn btn-primary btn-full" disabled>Login with Face</button>
      </div>

      <!-- Password Login tab -->
      <div id="tab-password" class="tab-content">
        <form id="passwordForm" novalidate>
          <div class="form-group">
            <label for="studentId">Student ID</label>
            <input type="text" id="studentId" required placeholder="e.g. STU-2024-001" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Your password" />
          </div>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
      </div>

      <p class="auth-footer">Don't have an account? <a href="register.html">Register here</a></p>
      <div id="notification" class="notification hidden"></div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2024 FaceAuth — Student Face Verification System</p>
  </footer>

  <script>
    const API_BASE = window.API_BASE || 'http://localhost:5000';
    let stream = null;
    let faceDetected = false;
    let modelsLoaded = false;

    // ── Tab switching ────────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        if (btn.dataset.tab === 'face') startCamera();
        else stopCamera();
      });
    });

    // ── Camera ───────────────────────────────────────────────────────────────
    async function startCamera() {
      const video = document.getElementById('video');
      if (video.srcObject) return; // already running
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
        video.srcObject = stream;
        await loadModels();
        detectFaceLoop();
      } catch (err) {
        showNotification('Camera error: ' + err.message, 'error');
      }
    }

    async function loadModels() {
      const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights';
      try {
        await Promise.all([faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)]);
        modelsLoaded = true;
      } catch (_) {
        document.getElementById('faceLoginBtn').disabled = false;
        document.getElementById('faceStatus').textContent = 'Camera ready (model offline)';
      }
    }

    async function detectFaceLoop() {
      const video = document.getElementById('video');
      const overlay = document.getElementById('overlay');
      const status  = document.getElementById('faceStatus');
      const loginBtn = document.getElementById('faceLoginBtn');
      if (!modelsLoaded) return;

      overlay.width  = video.videoWidth  || 640;
      overlay.height = video.videoHeight || 480;
      const ctx = overlay.getContext('2d');
      const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 224 });

      const loop = async () => {
        if (!video.srcObject) return;
        const detections = await faceapi.detectAllFaces(video, options);
        ctx.clearRect(0, 0, overlay.width, overlay.height);

        if (detections.length > 0) {
          const box = detections[0].box;
          ctx.strokeStyle = '#22c55e';
          ctx.lineWidth = 3;
          ctx.strokeRect(box.x, box.y, box.width, box.height);
          status.textContent = '✅ Face detected';
          status.className = 'face-status success';
          faceDetected = true;
          loginBtn.disabled = false;
        } else {
          status.textContent = '🔍 Looking for face…';
          status.className = 'face-status';
          faceDetected = false;
          loginBtn.disabled = true;
        }
        requestAnimationFrame(loop);
      };
      video.addEventListener('loadeddata', loop, { once: true });
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
        const video = document.getElementById('video');
        video.srcObject = null;
      }
    }

    // ── Face login ───────────────────────────────────────────────────────────
    document.getElementById('faceLoginBtn').addEventListener('click', async () => {
      const video = document.getElementById('video');
      const btn = document.getElementById('faceLoginBtn');
      btn.disabled = true;
      btn.textContent = 'Verifying…';

      const canvas = document.createElement('canvas');
      canvas.width  = video.videoWidth  || 640;
      canvas.height = video.videoHeight || 480;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const b64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ face_image: b64 }),
        });
        const json = await res.json();
        if (res.ok) {
          localStorage.setItem('token', json.token);
          showNotification('Login successful! Redirecting…', 'success');
          stopCamera();
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        } else {
          showNotification(json.error || 'Login failed.', 'error');
          btn.disabled = false;
          btn.textContent = 'Login with Face';
        }
      } catch (err) {
        showNotification('Network error: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Login with Face';
      }
    });

    // ── Password login ───────────────────────────────────────────────────────
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const sid = document.getElementById('studentId').value.trim();
      const pw  = document.getElementById('password').value;
      if (!sid || !pw) { showNotification('Please fill all fields.', 'error'); return; }

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ student_id: sid, password: pw }),
        });
        const json = await res.json();
        if (res.ok) {
          localStorage.setItem('token', json.token);
          showNotification('Login successful! Redirecting…', 'success');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        } else {
          showNotification(json.error || 'Invalid credentials.', 'error');
        }
      } catch (err) {
        showNotification('Network error: ' + err.message, 'error');
      }
    });

    // ── Notifications ────────────────────────────────────────────────────────
    function showNotification(msg, type = 'info') {
      const el = document.getElementById('notification');
      el.textContent = msg;
      el.className = `notification ${type}`;
      setTimeout(() => { el.className = 'notification hidden'; }, 5000);
    }

    // Auto-start camera on face tab (default)
    window.addEventListener('DOMContentLoaded', startCamera);
  </script>
</body>
</html>
